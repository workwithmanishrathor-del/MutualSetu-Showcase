<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Teacher Profile Demo</title>

<style>
body{
font-family:Inter,sans-serif;
background:#f3f6fb;
margin:0;
padding:20px;
}
.card{
max-width:420px;
margin:auto;
background:#fff;
border-radius:18px;
padding:20px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}
.avatar{
font-size:70px;
text-align:center;
}
h2{text-align:center;margin:10px 0;}
.badge{
background:#2563eb;
color:#fff;
padding:6px 12px;
border-radius:30px;
display:inline-block;
margin:auto;
}
.info p{
margin:10px 0;
}
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:#2563eb;
color:#fff;
font-size:16px;
cursor:pointer;
}
.popup{
position:fixed;
inset:0;
background:rgba(0,0,0,.6);
display:flex;
justify-content:center;
align-items:center;
}
.box{
background:#fff;
padding:20px;
border-radius:16px;
max-width:320px;
text-align:center;
}
.close{
margin-top:15px;
background:#111827;
}
</style>

</head>
<body>

<div class="card">

<div class="avatar">👨‍🏫</div>

<h2>Demo Teacher</h2>

<center><span class="badge">⭐ 96% Match</span></center>

<div class="info">
<p><b>Subject:</b> Mathematics</p>
<p><b>Current:</b> Sample District</p>
<p><b>Preferred:</b> Demo City</p>
<p><b>Experience:</b> 8 Years</p>
</div>

<button onclick="demo()">❤️ Send Interest</button>

</div>

<div class="popup" id="popup">

<div class="box">

<strong>🔍 Preview Demo</strong>

<p>
This is an early, simplified version.<br>
Buttons aren't functional here — the real MutualSetu app is more complete and polished.
</p>

<button class="close" onclick="document.getElementById('popup').style.display='none'">
Close
</button>

</div>

</div>

<script>
function demo(){
alert("Demo only. Feature available in the real MutualSetu app.");
}
</script>

</body>
</html>
