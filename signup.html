<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MutualSetu | Create Account (Demo)</title>

<meta name="theme-color" content="#2563EB">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Poppins:wght@600;700;800&display=swap" rel="stylesheet">

<style>
  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #3B4FE0 0%, #6D5BD0 100%);
    position: relative;
    overflow: hidden;
    padding: 24px;
  }

  .background-blur { position: absolute; border-radius: 50%; filter: blur(60px); opacity: 0.35; z-index: 0; }
  .blur-one { width: 260px; height: 260px; background: #A78BFA; top: -60px; left: -60px; }
  .blur-two { width: 300px; height: 300px; background: #60A5FA; bottom: -80px; right: -60px; }

  .signup-card {
    position: relative;
    z-index: 1;
    background: rgba(255,255,255,0.97);
    border-radius: 20px;
    padding: 36px 30px;
    max-width: 420px;
    width: 100%;
    box-shadow: 0 20px 50px rgba(0,0,0,0.2);
    max-height: 90vh;
    overflow-y: auto;
  }

  .logo-section { text-align: center; margin-bottom: 22px; }
  .logo-placeholder { width: 48px; height: 48px; margin: 0 auto 10px; border-radius: 12px; background: #E0E7FF; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; }
  .logo-section h1 { font-family: 'Poppins', sans-serif; font-size: 1.4rem; margin: 0 0 6px; color: #1E293B; }
  .logo-section p { margin: 0; color: #334155; font-weight: 600; }
  .logo-section span { display: block; margin-top: 4px; color: #64748B; font-size: 0.85rem; }

  .input-group { margin-bottom: 16px; }
  .input-group label { display: block; font-size: 0.85rem; font-weight: 600; color: #334155; margin-bottom: 6px; }
  .required { color: #DC2626; }
  .optional { color: #94A3B8; font-weight: 400; font-size: 0.8rem; }
  .input-group input, .input-group select { width: 100%; padding: 12px 14px; border-radius: 10px; border: 1px solid #CBD5E1; font-size: 0.95rem; font-family: inherit; background: #fff; }

  .password-box { position: relative; }
  .password-box input { padding-right: 40px; }
  .eye-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 1rem; }

  .remember { display: flex; align-items: center; gap: 8px; font-size: 0.82rem; color: #475569; margin: 14px 0 18px; }

  .signup-btn { width: 100%; padding: 13px; background: #2563EB; color: #fff; border: none; border-radius: 10px; font-weight: 600; font-size: 0.95rem; cursor: pointer; margin-bottom: 10px; }
  .google-btn { width: 100%; padding: 13px; background: #fff; border: 1px solid #CBD5E1; border-radius: 10px; font-weight: 600; font-size: 0.9rem; cursor: pointer; }

  .bottom-links { text-align: center; margin-top: 18px; font-size: 0.85rem; color: #475569; }
  .bottom-links a { color: #2563EB; text-decoration: none; font-weight: 600; }
  .home-link { display: block; margin-top: 10px; color: #94A3B8 !important; font-weight: 400 !important; }

  @keyframes slideUp {
    from { transform: translateY(20px); opacity: 0; }
    to { transform: translateY(0); opacity: 1; }
  }
</style>

</head>
<body>

<div class="background-blur blur-one"></div>
<div class="background-blur blur-two"></div>

<div class="signup-card">

<div class="logo-section">
    <div class="logo-placeholder">🔷</div>
    <h1>MutualSetu</h1>
    <p>Create Your Account 🚀</p>
    <span>Sample tagline text goes here</span>
</div>

<form id="signupForm" onsubmit="return false;">

    <div class="input-group">
        <label>Full Name <span class="required">*</span></label>
        <input type="text" placeholder="Enter your full name">
    </div>

    <div class="input-group">
        <label>Email Address <span class="required">*</span></label>
        <input type="email" placeholder="Enter your email">
    </div>

    <div class="input-group">
        <label>Mobile Number <span class="required">*</span></label>
        <input type="tel" placeholder="Enter mobile number">
    </div>

    <div class="input-group">
        <label>Teacher Post <span class="required">*</span></label>
        <select>
            <option value="">Select Teacher Post</option>
            <option>Sample Post A</option>
            <option>Sample Post B</option>
        </select>
    </div>

    <div class="input-group">
        <label>Subject <span class="required">*</span></label>
        <select>
            <option value="">Select Subject</option>
            <option>Sample Subject A</option>
            <option>Sample Subject B</option>
        </select>
    </div>

    <div class="input-group">
        <label>Current State <span class="required">*</span></label>
        <select>
            <option value="">Select State</option>
            <option>Sample State</option>
        </select>
    </div>

    <div class="input-group">
        <label>Current District <span class="required">*</span></label>
        <select>
            <option value="">Select District</option>
            <option>Sample District</option>
        </select>
    </div>

    <div class="input-group">
        <label>Current Block <span class="optional">(Optional)</span></label>
        <select>
            <option value="">Select Block (Optional)</option>
        </select>
    </div>

    <div class="input-group">
        <label>Preferred State <span class="required">*</span></label>
        <select>
            <option value="">Select Preferred State</option>
            <option>Sample State</option>
        </select>
    </div>

    <div class="input-group">
        <label>Preferred District <span class="required">*</span></label>
        <select>
            <option value="">Select Preferred District</option>
            <option>Sample District</option>
        </select>
    </div>

    <div class="input-group">
        <label>Password <span class="required">*</span></label>
        <div class="password-box">
            <input type="password" placeholder="Create password">
            <button type="button" class="eye-btn">👁️</button>
        </div>
    </div>

    <div class="input-group">
        <label>Confirm Password <span class="required">*</span></label>
        <div class="password-box">
            <input type="password" placeholder="Confirm password">
            <button type="button" class="eye-btn">👁️</button>
        </div>
    </div>

    <label class="remember">
        <input type="checkbox">
        I agree to the Terms & Privacy Policy.
    </label>

    <button type="submit" class="signup-btn">Create Account</button>
    <button type="button" class="google-btn">Continue with Google</button>

</form>

<div class="bottom-links">
    <p>Already have an account? <a href="#">Login</a></p>
    <a href="#" class="home-link">← Back to Home</a>
</div>

</div>

<script>
  // MutualSetu — Dummy Demo Script
  // No real validation, storage, or account
  // creation logic. Dropdowns use sample
  // placeholder options only.
  console.log("MutualSetu demo — static preview only.");
</script>

<!-- Demo Notice Toast -->
<div id="demoNotice" style="
  position: fixed;
  bottom: 20px;
  right: 20px;
  max-width: 300px;
  background: #1E293B;
  color: #F8FAFC;
  padding: 16px 18px;
  border-radius: 12px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.25);
  font-family: 'Inter', sans-serif;
  font-size: 0.85rem;
  line-height: 1.5;
  z-index: 9999;
  animation: slideUp 0.4s ease;
">
  <button onclick="document.getElementById('demoNotice').style.display='none'" style="
    position: absolute;
    top: 8px;
    right: 10px;
    background: none;
    border: none;
    color: #94A3B8;
    font-size: 1rem;
    cursor: pointer;
  ">✕</button>
  <strong>🔍 Preview Demo</strong><br>
  This is an early, simplified version. Buttons aren't functional here — the real MutualSetu app is more complete and polished.
</div>

</body>
</html>
